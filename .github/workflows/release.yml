name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build install zip
        run: |
          # The tag (e.g. v0.1.0) becomes the version in the zip filename
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="pitch-deck-coach-${VERSION}.zip"

          # Stage the skill folder. Only the files that ship to the user
          # go inside (SKILL.md and references/). README, CLAUDE.md, LICENSE,
          # CHANGELOG are repo-level files, not part of the installed skill.
          mkdir -p staging/pitch-deck-coach
          cp SKILL.md staging/pitch-deck-coach/SKILL.md
          cp -r references staging/pitch-deck-coach/references

          cd staging
          zip -r "../${ZIP_NAME}" pitch-deck-coach
          cd ..

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          body: |
            ## Installation

            Download `${{ env.ZIP_NAME }}` from the Assets below, unzip it, and follow the install instructions in the [README](https://github.com/betahope/pitch-deck-coach#how-to-install).

            See [CHANGELOG.md](https://github.com/betahope/pitch-deck-coach/blob/main/CHANGELOG.md) for what changed in this release.
